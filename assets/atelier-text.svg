<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" fill="none">
  <defs>
    <linearGradient id="atxt" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="asub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>

  <!-- Main word: Atelier -->
  <text x="190" y="58" text-anchor="middle"
        font-family="'Playfair Display', Georgia, 'Noto Serif', serif"
        font-size="56" font-weight="600" letter-spacing="8"
        fill="url(#atxt)">Atelier</text>

  <!-- Subtitle line -->
  <line x1="40" y1="78" x2="340" y2="78" stroke="#334155" stroke-width="1" opacity="0.5"/>

  <!-- Small accent -->
  <circle cx="350" cy="78" r="2.5" fill="#38bdf8" opacity="0.6"/>
  <circle cx="30" cy="78" r="1.5" fill="#818cf8" opacity="0.4"/>

  <!-- Subtitle text -->
  <text x="190" y="94" text-anchor="middle"
        font-family="'Inter', system-ui, sans-serif"
        font-size="11" font-weight="400" letter-spacing="4"
        fill="#64748b">SERIOUS LITERARY FICTION</text>
</svg>