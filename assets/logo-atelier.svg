<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="abg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="aline" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#64748b"/>
    </linearGradient>
    <linearGradient id="aaccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <filter id="aglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#abg)" stroke="#334155" stroke-width="2"/>

  <!-- Subtle frame lines suggesting a manuscript / atelier blueprint -->
  <rect x="56" y="56" width="400" height="400" rx="64" fill="none" stroke="#334155" stroke-width="1" stroke-dasharray="6 6" opacity="0.4"/>

  <!-- Central "A" structure — abstracted as an open frame / drafting table -->
  <path d="M196 356 L256 176 L316 356" fill="none" stroke="url(#aline)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <line x1="220" y1="290" x2="292" y2="290" stroke="url(#aline)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>

  <!-- Accent crossbar — the "atelier beam" -->
  <line x1="196" y1="220" x2="316" y2="220" stroke="url(#aaccent)" stroke-width="6" stroke-linecap="round" filter="url(#aglow)" opacity="0.95"/>

  <!-- Small accent dots — constellations of ideas -->
  <circle cx="140" cy="200" r="4" fill="#38bdf8" opacity="0.5"/>
  <circle cx="372" cy="200" r="4" fill="#818cf8" opacity="0.5"/>
  <circle cx="140" cy="310" r="3" fill="#94a3b8" opacity="0.3"/>
  <circle cx="372" cy="310" r="3" fill="#94a3b8" opacity="0.3"/>

  <!-- Bottom serif base -->
  <line x1="176" y1="356" x2="336" y2="356" stroke="#475569" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
</svg>